<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Login & Signup</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    overflow:hidden;
}

/* Background Animation */
body::before{
    content:'';
    position:absolute;
    width:200%;
    height:200%;
    background:radial-gradient(circle,#ffffff20 20%,transparent 20%);
    background-size:50px 50px;
    animation:moveBg 15s linear infinite;
}

@keyframes moveBg{
    from{transform:translate(0,0);}
    to{transform:translate(-200px,-200px);}
}

.container{
    position:relative;
    width:850px;
    height:500px;
    background:#ffffff20;
    backdrop-filter:blur(15px);
    border-radius:20px;
    box-shadow:0 25px 45px rgba(0,0,0,0.2);
    overflow:hidden;
}

/* Sliding Panels */
.form-container{
    position:absolute;
    top:0;
    height:100%;
    width:50%;
    transition:0.6s ease-in-out;
}

.sign-in{
    left:0;
    z-index:2;
}

.sign-up{
    left:0;
    opacity:0;
    z-index:1;
}

.container.active .sign-in{
    transform:translateX(100%);
    opacity:0;
}

.container.active .sign-up{
    transform:translateX(100%);
    opacity:1;
    z-index:5;
}

/* Forms */
form{
    background:transparent;
    display:flex;
    flex-direction:column;
    padding:0 50px;
    height:100%;
    justify-content:center;
    text-align:center;
}

h1{
    font-weight:600;
    margin-bottom:20px;
    color:#fff;
}

.input-group{
    position:relative;
    margin:15px 0;
}

input{
    width:100%;
    padding:12px 10px;
    background:transparent;
    border:none;
    border-bottom:2px solid #fff;
    outline:none;
    color:#fff;
    font-size:16px;
}

label{
    position:absolute;
    left:10px;
    top:12px;
    color:#ddd;
    transition:0.3s;
    pointer-events:none;
}

input:focus + label,
input:valid + label{
    top:-10px;
    font-size:12px;
    color:#fff;
}

/* Button */
button{
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:25px;
    background:#fff;
    color:#764ba2;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    position:relative;
    overflow:hidden;
}

button:hover{
    transform:scale(1.05);
    background:#764ba2;
    color:#fff;
}

/* Overlay Panel */
.overlay{
    position:absolute;
    top:0;
    left:50%;
    width:50%;
    height:100%;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    color:#fff;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:0 40px;
    transition:0.6s ease-in-out;
}

.container.active .overlay{
    transform:translateX(-100%);
}

.overlay h2{
    margin-bottom:15px;
}

.overlay button{
    background:#fff;
    color:#ff758c;
    margin-top:15px;
}

/* Responsive */
@media(max-width:768px){
    .container{
        width:90%;
        height:600px;
    }
    .overlay{
        display:none;
    }
    .form-container{
        width:100%;
    }
}
</style>
</head>

<body>

<div class="container" id="container">

    <!-- Sign Up -->
    <div class="form-container sign-up">
        <form>
            <h1>Create Account</h1>

            <div class="input-group">
                <input type="text" required>
                <label>Full Name</label>
            </div>

            <div class="input-group">
                <input type="email" required>
                <label>Email</label>
            </div>

            <div class="input-group">
                <input type="password" required>
                <label>Password</label>
            </div>

            <button>Sign Up</button>
        </form>
    </div>

    <!-- Sign In -->
    <div class="form-container sign-in">
        <form>
            <h1>Sign In</h1>

            <div class="input-group">
                <input type="email" required>
                <label>Email</label>
            </div>

            <div class="input-group">
                <input type="password" required>
                <label>Password</label>
            </div>

            <button>Login</button>
        </form>
    </div>

    <!-- Overlay -->
    <div class="overlay">
        <h2>Hello, Friend!</h2>
        <p>Enter your details and start your journey with us</p>
        <button id="toggle">Switch Form</button>
    </div>

</div>

<script>
const container = document.getElementById('container');
const toggle = document.getElementById('toggle');

toggle.addEventListener('click', () => {
    container.classList.toggle('active');
});
</script>

</body>
</html>
